<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter | CrazyNate.fyi</title>

<style>
:root {
    --bg: #0f172a;
    --card: #1e293b;
    --accent: #38bdf8;
    --text: #f8fafc;
    --error: #ef4444;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 2rem;
    font-family: system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.container {
    max-width: 1200px;
    margin: auto;
}

h1 {
    color: var(--accent);
    text-align: center;
}

.subtitle {
    text-align: center;
    opacity: .8;
    margin-bottom: 2rem;
}

textarea {
    width: 100%;
    height: 350px;
    padding: 1rem;
    border-radius: 12px;
    border: none;
    resize: vertical;
    background: #020617;
    color: white;
    font-family: Consolas, monospace;
    font-size: 14px;
}

.buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 1rem 0;
}

button {
    border: none;
    cursor: pointer;
    padding: 12px 18px;
    border-radius: 10px;
    font-weight: bold;
    background: var(--accent);
    color: black;
}

button:hover {
    opacity: .9;
}

.output {
    margin-top: 1rem;
}

pre {
    background: #020617;
    padding: 1rem;
    border-radius: 12px;
    overflow: auto;
    min-height: 200px;
    white-space: pre-wrap;
    word-break: break-word;
}

.error {
    color: var(--error);
    font-weight: bold;
}
</style>
</head>
<body>

<div class="container">

    <h1>JSON Formatter</h1>

    <p class="subtitle">
        Paste JSON below and format, validate, minify, or copy it.
    </p>

    <textarea id="jsonInput" placeholder='{"hello":"world"}'></textarea>

    <div class="buttons">
        <button onclick="formatJSON()">Format</button>
        <button onclick="minifyJSON()">Minify</button>
        <button onclick="validateJSON()">Validate</button>
        <button onclick="copyOutput()">Copy Output</button>
        <button onclick="clearAll()">Clear</button>
    </div>

    <div class="output">
        <pre id="output">Output appears here...</pre>
    </div>

</div>

<script>
const input = document.getElementById("jsonInput");
const output = document.getElementById("output");

function formatJSON() {
    try {
        const obj = JSON.parse(input.value);
        output.textContent = JSON.stringify(obj, null, 4);
        output.className = "";
    } catch (err) {
        output.innerHTML =
            `<span class="error">Invalid JSON:<br>${err.message}</span>`;
    }
}

function minifyJSON() {
    try {
        const obj = JSON.parse(input.value);
        output.textContent = JSON.stringify(obj);
        output.className = "";
    } catch (err) {
        output.innerHTML =
            `<span class="error">Invalid JSON:<br>${err.message}</span>`;
    }
}

function validateJSON() {
    try {
        JSON.parse(input.value);

        output.innerHTML =
            `<span style="color:#22c55e;font-weight:bold;">
            ✓ Valid JSON
            </span>`;
    } catch (err) {
        output.innerHTML =
            `<span class="error">
            ✗ Invalid JSON<br>${err.message}
            </span>`;
    }
}

async function copyOutput() {
    try {
        await navigator.clipboard.writeText(output.textContent);
        alert("Copied!");
    } catch {
        alert("Copy failed.");
    }
}

function clearAll() {
    input.value = "";
    output.textContent = "Output appears here...";
}
</script>

</body>
</html>
